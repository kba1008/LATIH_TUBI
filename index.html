<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latih Tubi Pintar AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 3D Baby Blue Glassmorphism utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 
                0 12px 32px 0 rgba(31, 38, 135, 0.15),
                inset 0 2px 0 0 rgba(255, 255, 255, 0.9),
                inset 0 -2px 0 0 rgba(0, 0, 0, 0.05);
            color: #1e293b;
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            color: #0f172a;
        }
        .glass-button {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.05), 
                inset 0 -3px 5px rgba(0, 0, 0, 0.05), 
                inset 0 3px 5px rgba(255, 255, 255, 0.9);
            color: #1e293b;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .glass-button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-3px);
            box-shadow: 
                0 8px 25px rgba(0, 0, 0, 0.1), 
                inset 0 -3px 5px rgba(0, 0, 0, 0.05), 
                inset 0 3px 5px rgba(255, 255, 255, 1);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.9);
            color: #0f172a;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        .glass-input::placeholder {
            color: #64748b;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.8); }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-200 via-blue-100 to-cyan-200 min-h-screen text-slate-800 font-sans flex flex-col">

    <!-- Header -->
    <header class="glass-header p-4 sticky top-0 z-10">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i data-lucide="brain-circuit" class="w-7 h-7 text-blue-600"></i>
                <h1 class="text-xl font-extrabold tracking-wide text-slate-800">Latih<span class="text-blue-600">AI</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex flex-col items-end">
                    <span id="headerPlayerName" class="text-sm font-bold text-slate-700">-</span>
                    <span class="text-xs text-blue-600 font-black"><span id="headerPoints">0</span> Mata</span>
                </div>
                <button onclick="showLeaderboard()" class="p-2 hover:bg-white/50 rounded-full transition" title="Papan Pendahulu">
                    <i data-lucide="trophy" class="w-5 h-5 text-amber-500"></i>
                </button>
                <button onclick="promptPassword()" class="p-2 hover:bg-white/50 rounded-full transition" title="Tetapan">
                    <i data-lucide="settings" class="w-5 h-5 text-slate-500"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-3xl mx-auto p-4 mt-6 flex-grow w-full">
        
        <!-- Init / Welcome Screen -->
        <div id="welcomeScreen" class="glass-panel rounded-3xl p-8 text-center fade-in">
            <div class="inline-block p-5 rounded-full bg-blue-100/80 shadow-inner mb-6">
                <i data-lucide="rocket" class="w-12 h-12 text-blue-500"></i>
            </div>
            <h2 class="text-3xl font-black mb-3 bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-cyan-600">Bersedia untuk Cabaran?</h2>
            <p class="text-slate-600 mb-8 font-medium">Uji minda anda, kumpul mata, dan tewaskan rakan-rakan di Papan Pendahulu!</p>
            
            <div class="max-w-md mx-auto space-y-4">
                <div>
                    <label class="block text-left text-sm font-bold text-slate-700 mb-2 ml-1">Nama Pemain</label>
                    <input type="text" id="playerNameInput" class="glass-input w-full rounded-2xl p-4 focus:ring-4 focus:ring-blue-300 outline-none transition font-semibold" placeholder="Masukkan nama anda...">
                </div>
                <button onclick="initApp()" class="w-full bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white font-black py-4 px-6 rounded-2xl transition shadow-xl shadow-blue-500/40 flex items-center justify-center gap-2 transform hover:-translate-y-1">
                    <i data-lucide="play-circle" class="w-6 h-6"></i> Mula Bermain
                </button>
            </div>
            <p id="initStatus" class="text-sm text-blue-600 font-bold mt-6 hidden animate-pulse">Sedang menyambung ke pelayan...</p>
        </div>

        <!-- Loading State -->
        <div id="loadingScreen" class="glass-panel rounded-3xl p-10 text-center hidden fade-in">
            <i data-lucide="loader-2" class="w-14 h-14 mx-auto text-blue-500 animate-spin mb-4"></i>
            <h2 class="text-xl font-extrabold text-slate-800">AI sedang menjana cabaran...</h2>
            <p class="text-slate-500 mt-2 font-medium">Sila tunggu sebentar.</p>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="hidden fade-in space-y-6">
            
            <!-- Actions & Note Area -->
            <div class="flex justify-end">
                <button id="btnGenerateNote" onclick="generateNote()" class="flex items-center gap-2 bg-gradient-to-r from-amber-400 to-orange-400 hover:from-amber-500 hover:to-orange-500 text-white text-sm font-extrabold py-2 px-5 rounded-full transition shadow-lg shadow-amber-400/30">
                    <i data-lucide="book-open" class="w-4 h-4"></i> Jana Nota AI
                </button>
            </div>
            
            <!-- Generated Note Card -->
            <div id="noteArea" class="hidden glass-panel rounded-2xl p-6 border-l-8 border-l-amber-400 fade-in">
                <div class="flex items-center gap-2 mb-3 text-amber-600 font-black">
                    <i data-lucide="lightbulb" class="w-6 h-6"></i>
                    <h3>Nota Ringkas</h3>
                </div>
                <p id="noteText" class="text-slate-700 text-sm font-medium leading-relaxed whitespace-pre-wrap"></p>
            </div>

            <!-- Question Area -->
            <div class="glass-panel p-8 rounded-3xl">
                <h3 id="questionText" class="text-2xl font-black mb-8 text-slate-800 leading-snug"></h3>
                <div id="optionsContainer" class="space-y-4">
                    <!-- Options will be injected here -->
                </div>
            </div>

            <!-- Feedback Area -->
            <div id="feedbackArea" class="hidden p-6 rounded-3xl fade-in glass-panel border-2">
                <div id="feedbackHeader" class="flex items-center gap-2 font-black mb-3 text-xl"></div>
                <p id="feedbackText" class="text-slate-700 font-medium text-sm leading-relaxed mb-6"></p>
                <button onclick="generateNextQuestion()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 px-4 rounded-2xl transition flex items-center justify-center gap-2 shadow-lg shadow-slate-800/30">
                    Teruskan <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Leaderboard Modal -->
    <div id="leaderboardModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
        <div class="glass-panel rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-amber-100 rounded-full">
                        <i data-lucide="trophy" class="w-6 h-6 text-amber-500"></i>
                    </div>
                    <h3 class="text-2xl font-black text-slate-800">Papan Pendahulu</h3>
                </div>
                <button onclick="closeLeaderboard()" class="text-slate-400 hover:text-slate-700 transition">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div id="leaderboardContent" class="space-y-3 max-h-72 overflow-y-auto pr-2">
                <div class="text-center text-slate-500 py-4 font-medium">Memuat turun data...</div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
        <div class="glass-panel rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black flex items-center gap-3 text-slate-800">
                    <div class="p-2 bg-blue-100 rounded-full">
                        <i data-lucide="settings" class="w-6 h-6 text-blue-600"></i>
                    </div>
                    Tetapan
                </h3>
                <button onclick="closeSettings()" class="text-slate-400 hover:text-slate-700">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-bold mb-2 text-slate-700">URL Google Web App</label>
                <input type="text" id="gasUrlInput" class="glass-input w-full rounded-2xl p-4 focus:ring-4 focus:ring-blue-300 outline-none font-medium text-sm" placeholder="Masukkan link Google Apps Script...">
            </div>
            <button onclick="saveSettings()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl transition shadow-lg shadow-blue-600/30">
                Simpan Tetapan
            </button>
        </div>
    </div>

    <!-- Custom Alert Modal -->
    <div id="customAlertModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4 hidden z-[100]">
        <div class="glass-panel rounded-3xl p-8 w-full max-w-sm text-center transform scale-95 transition-transform duration-300 shadow-2xl" id="customAlertBox">
            <div id="customAlertIcon" class="mx-auto mb-4 w-14 h-14 flex items-center justify-center rounded-full bg-blue-100 text-blue-500 shadow-inner">
                <i data-lucide="info" class="w-7 h-7"></i>
            </div>
            <h3 id="customAlertTitle" class="text-xl font-black mb-2 text-slate-800">Makluman</h3>
            <p id="customAlertMessage" class="text-slate-600 text-sm font-medium mb-8 leading-relaxed"></p>
            <button onclick="closeCustomAlert()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition w-full shadow-lg">Tutup</button>
        </div>
    </div>

    <!-- Custom Prompt Modal -->
    <div id="customPromptModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4 hidden z-[100]">
        <div class="glass-panel rounded-3xl p-8 w-full max-w-sm transform scale-95 transition-transform duration-300 shadow-2xl" id="customPromptBox">
            <h3 class="text-xl font-black mb-2 text-slate-800">Pengesahan</h3>
            <p id="customPromptMessage" class="text-slate-600 text-sm font-medium mb-6"></p>
            <input type="password" id="customPromptInput" class="glass-input w-full rounded-xl p-4 focus:ring-4 focus:ring-blue-300 outline-none transition mb-6 font-bold tracking-widest text-center" placeholder="***">
            <div class="flex gap-3">
                <button onclick="closeCustomPrompt()" class="flex-1 bg-slate-400 hover:bg-slate-500 text-white font-bold py-3 px-4 rounded-xl transition">Batal</button>
                <button onclick="submitCustomPrompt()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg">Sahkan</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // URL GAS LALAI DARI PENGGUNA
        // ==========================================
        const DEFAULT_GAS_URL = "https://script.google.com/macros/s/AKfycbx6y-lN8OjqaDOciMTJv21BwuVGcWbuq-YbWqSGW4nF7hqrWn_HbqFJzz19Z7__S7XPNw/exec";
        // ==========================================

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker terdaftar', reg))
                    .catch(err => console.error('Ralat Service Worker', err));
            });
        }

        lucide.createIcons();

        let state = {
            gasUrl: localStorage.getItem('gasUrl') || DEFAULT_GAS_URL,
            apiKey: '',
            questions: [],
            currentQuiz: null,
            isProcessing: false,
            playerName: localStorage.getItem('playerName') || '',
            points: parseInt(localStorage.getItem('points')) || 0,
            noteGenerated: false
        };

        if(state.playerName) document.getElementById('playerNameInput').value = state.playerName;
        updateHeaderUI();

        function showCustomAlert(message, isError = false) {
            document.getElementById('customAlertMessage').textContent = message;
            const iconDiv = document.getElementById('customAlertIcon');
            if (isError) {
                iconDiv.className = 'mx-auto mb-4 w-14 h-14 flex items-center justify-center rounded-full bg-red-100 text-red-500 shadow-inner';
                iconDiv.innerHTML = '<i data-lucide="alert-triangle" class="w-7 h-7"></i>';
                document.getElementById('customAlertTitle').textContent = 'Ralat';
            } else {
                iconDiv.className = 'mx-auto mb-4 w-14 h-14 flex items-center justify-center rounded-full bg-blue-100 text-blue-500 shadow-inner';
                iconDiv.innerHTML = '<i data-lucide="info" class="w-7 h-7"></i>';
                document.getElementById('customAlertTitle').textContent = 'Makluman';
            }
            lucide.createIcons();
            const modal = document.getElementById('customAlertModal');
            modal.classList.remove('hidden');
            setTimeout(() => document.getElementById('customAlertBox').classList.replace('scale-95', 'scale-100'), 10);
        }

        function closeCustomAlert() {
            document.getElementById('customAlertBox').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('customAlertModal').classList.add('hidden'), 300);
        }

        let promptCallback = null;
        function showCustomPrompt(message, callback) {
            document.getElementById('customPromptMessage').textContent = message;
            document.getElementById('customPromptInput').value = '';
            promptCallback = callback;
            const modal = document.getElementById('customPromptModal');
            modal.classList.remove('hidden');
            setTimeout(() => document.getElementById('customPromptBox').classList.replace('scale-95', 'scale-100'), 10);
        }

        function closeCustomPrompt() {
            document.getElementById('customPromptBox').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('customPromptModal').classList.add('hidden'), 300);
            promptCallback = null;
        }

        function submitCustomPrompt() {
            const val = document.getElementById('customPromptInput').value;
            if (promptCallback) promptCallback(val);
            closeCustomPrompt();
        }

        function updateHeaderUI() {
            document.getElementById('headerPlayerName').textContent = state.playerName || '-';
            document.getElementById('headerPoints').textContent = state.points;
        }

        function promptPassword() {
            showCustomPrompt("Sila masukkan kata laluan untuk mengakses tetapan:", (pwd) => {
                if (pwd === "101010") {
                    document.getElementById('gasUrlInput').value = state.gasUrl;
                    document.getElementById('settingsModal').classList.remove('hidden');
                } else if (pwd !== "") {
                    showCustomAlert("Kata laluan salah!", true);
                }
            });
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function saveSettings() {
            state.gasUrl = document.getElementById('gasUrlInput').value.trim();
            localStorage.setItem('gasUrl', state.gasUrl);
            showCustomAlert("Tetapan berjaya disimpan!");
            closeSettings();
        }

        function showScreen(screenId) {
            ['welcomeScreen', 'loadingScreen', 'quizScreen'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
        }

        async function showLeaderboard() {
            document.getElementById('leaderboardModal').classList.remove('hidden');
            const lbContent = document.getElementById('leaderboardContent');
            lbContent.innerHTML = '<div class="text-center text-blue-500 py-4 font-bold animate-pulse">Memuat turun data...</div>';

            if(!state.gasUrl) {
                lbContent.innerHTML = '<div class="text-center text-red-500 py-4 font-bold">Sila tetapkan URL Web App dahulu.</div>';
                return;
            }

            try {
                const response = await fetch(state.gasUrl, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'get_leaderboard' })
                });
                
                if (!response.ok) throw new Error("Rangkaian pelayan bermasalah");
                const data = await response.json();
                
                if(data.leaderboard && data.leaderboard.length > 0) {
                    lbContent.innerHTML = '';
                    data.leaderboard.forEach((player, index) => {
                        let medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `<span class="w-6 inline-block text-center text-slate-400 font-black">${index+1}</span>`;
                        let isMe = player.name === state.playerName ? 'bg-blue-100 border-blue-300 shadow-md' : 'bg-white/50 border-transparent';
                        let textMe = player.name === state.playerName ? 'text-blue-700' : 'text-slate-700';
                        
                        lbContent.innerHTML += `
                            <div class="flex justify-between items-center p-4 rounded-2xl border ${isMe} transition">
                                <div class="flex items-center gap-4">
                                    <span class="text-2xl drop-shadow-sm">${medal}</span>
                                    <span class="font-extrabold ${textMe}">${player.name}</span>
                                </div>
                                <span class="font-black text-blue-600 text-lg">${player.points} <span class="text-xs font-semibold text-slate-500">pts</span></span>
                            </div>
                        `;
                    });
                } else {
                    lbContent.innerHTML = '<div class="text-center text-slate-500 py-4 font-bold">Belum ada rekod pendahulu.</div>';
                }
            } catch(e) {
                console.error("Ralat memuat turun Papan Pendahulu:", e);
                lbContent.innerHTML = '<div class="text-center text-red-500 py-4 font-bold">Gagal memuat turun papan pendahulu. Sila cuba lagi.</div>';
            }
        }

        function closeLeaderboard() {
            document.getElementById('leaderboardModal').classList.add('hidden');
        }

        async function initApp() {
            const nameInput = document.getElementById('playerNameInput').value.trim();
            if (!nameInput) {
                showCustomAlert("Sila masukkan nama anda untuk mula mengumpul markah.", true);
                return;
            }
            
            state.playerName = nameInput;
            localStorage.setItem('playerName', state.playerName);
            updateHeaderUI();

            if (!state.gasUrl) {
                showCustomAlert("Sila masukkan URL Google Web App melalui butang tetapan terlebih dahulu.", true);
                return;
            }
            
            const statusEl = document.getElementById('initStatus');
            statusEl.classList.remove('hidden');
            statusEl.textContent = "Menyambung pangkalan data...";

            try {
                const response = await fetch(state.gasUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'init', name: state.playerName })
                });
                
                if (!response.ok) throw new Error("Gagal menyambung ke pangkalan data Google Sheet.");
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);
                if (!data.questions || data.questions.length === 0) throw new Error("Tiada rekod soalan ditemui dalam tab 'SOALAN'.");

                state.apiKey = data.apiKey;
                state.questions = data.questions;
                
                if(data.userPoints !== undefined) {
                    state.points = data.userPoints;
                    localStorage.setItem('points', state.points);
                    updateHeaderUI();
                }

                await generateNextQuestion();

            } catch (error) {
                console.error("Ralat Init App:", error);
                showCustomAlert("Ralat Sistem: " + error.message, true);
                statusEl.classList.add('hidden');
            }
        }

        async function generateNextQuestion() {
            showScreen('loadingScreen');
            document.getElementById('feedbackArea').classList.add('hidden');
            
            state.noteGenerated = false;
            document.getElementById('noteArea').classList.add('hidden');
            const btnNote = document.getElementById('btnGenerateNote');
            btnNote.disabled = false;
            btnNote.innerHTML = `<i data-lucide="book-open" class="w-4 h-4"></i> Jana Nota AI`;
            
            const randomTopic = state.questions[Math.floor(Math.random() * state.questions.length)];
            
            const prompt = `Anda ialah guru pakar di Malaysia. Berdasarkan topik berikut: "${randomTopic}", hasilkan:
1. 1 Soalan objektif berkaitan topik tersebut.
2. 4 pilihan jawapan (A, B, C, D).
3. Indeks jawapan yang betul (0 untuk A, 1 untuk B, 2 untuk C, 3 untuk D).

Berikan maklum balas HANYA dalam format JSON yang sah seperti struktur di bawah, tanpa sebarang teks tambahan atau markdown:
{
  "soalan": "Teks soalan di sini...",
  "pilihan": ["Pilihan 1", "Pilihan 2", "Pilihan 3", "Pilihan 4"],
  "jawapan_betul": 0
}`;

            try {
                const groqResponse = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-70b-versatile",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.7
                    })
                });

                if (!groqResponse.ok) {
                    const errorData = await groqResponse.json();
                    console.error("Ralat Pelayan Groq API:", errorData);
                    throw new Error(`Sistem AI lambat bertindak balas atau kuota tamat. (Kod: ${groqResponse.status})`);
                }

                const groqData = await groqResponse.json();
                let content = groqData.choices[0].message.content;
                
                // Bersihkan kod markdown dari Llama
                content = content.replace(/```json/gi, '').replace(/```/g, '').trim();
                
                const jsonMatch = content.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error("Format JSON dari AI tidak tepat.");
                
                state.currentQuiz = JSON.parse(jsonMatch[0]);
                renderQuiz();
                showScreen('quizScreen');

            } catch (error) {
                console.error("Ralat Penjanaan Soalan:", error);
                showCustomAlert("Ada ralat semasa menjana soalan AI: " + error.message + ". Sila cuba lagi.", true);
                showScreen('welcomeScreen');
            }
        }

        function renderQuiz() {
            document.getElementById('questionText').textContent = state.currentQuiz.soalan;
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            state.currentQuiz.pilihan.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-5 rounded-2xl glass-button font-bold text-lg option-btn flex items-center gap-4';
                btn.innerHTML = `<span class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-full bg-blue-100 text-blue-600 font-black shadow-inner border border-blue-200">${['A','B','C','D'][index]}</span> <span>${opt}</span>`;
                btn.onclick = () => handleAnswer(index, btn);
                container.appendChild(btn);
            });
            lucide.createIcons();
        }

        async function generateNote() {
            if (state.noteGenerated || !state.currentQuiz) return;
            
            const btn = document.getElementById('btnGenerateNote');
            const noteArea = document.getElementById('noteArea');
            const noteText = document.getElementById('noteText');
            
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Menjana...`;
            lucide.createIcons();
            
            noteArea.classList.remove('hidden');
            noteText.innerHTML = '<span class="animate-pulse text-amber-500 font-bold">AI sedang menyusun nota ringkas untuk anda...</span>';

            const prompt = `Soalan: ${state.currentQuiz.soalan}\nPilihan Jawapan: ${state.currentQuiz.pilihan.join(", ")}\n\nSebagai guru pakar, berikan satu nota ringkas dan sangat mudah difahami berkaitan topik ini. Kaitkan nota tersebut dengan pilihan jawapan yang diberikan supaya murid faham mengapa pilihan tersebut wujud tanpa memberikan secara terang jawapan bocor. Tulis dalam perenggan yang kemas dan Bahasa Melayu yang santai.`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-70b-versatile",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.5,
                        max_tokens: 350
                    })
                });
                
                if (!response.ok) throw new Error("Ralat sistem AI nota");

                const data = await response.json();
                noteText.textContent = data.choices[0].message.content;
                state.noteGenerated = true;
                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> Nota Dijana`;
            } catch (error) {
                console.error("Ralat Penjanaan Nota:", error);
                noteText.textContent = "Gagal menjana nota. Sila cuba sebentar lagi.";
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="book-open" class="w-4 h-4"></i> Cuba Semula`;
            }
            lucide.createIcons();
        }

        async function handleAnswer(selectedIndex, btnElement) {
            if (state.isProcessing) return;
            state.isProcessing = true;
            
            document.querySelectorAll('.option-btn').forEach(b => {
                b.disabled = true;
                b.classList.remove('hover:bg-white/90');
                b.classList.add('opacity-60', 'cursor-not-allowed');
            });

            const isCorrect = selectedIndex === state.currentQuiz.jawapan_betul;
            const feedbackArea = document.getElementById('feedbackArea');
            const feedbackHeader = document.getElementById('feedbackHeader');
            const feedbackText = document.getElementById('feedbackText');
            
            feedbackArea.classList.remove('hidden', 'border-green-400', 'border-red-400', 'bg-green-50', 'bg-red-50');
            feedbackHeader.innerHTML = '';
            
            if (isCorrect) {
                btnElement.style.background = 'rgba(187, 247, 208, 0.8)'; // Green tint
                btnElement.style.borderColor = '#4ade80';
                btnElement.classList.remove('opacity-60');
                
                feedbackArea.classList.add('border-green-400', 'bg-green-50/90');
                feedbackHeader.innerHTML = `<i data-lucide="check-circle-2" class="w-7 h-7 text-green-600"></i> <span class="text-green-700">Tepat Sekali! +10 Mata</span>`;
                feedbackText.className = "text-green-800 font-bold text-sm leading-relaxed mb-6";
                feedbackText.textContent = "Tahniah! Jawapan anda adalah betul. Teruskan usaha cemerlang ini.";
                
                state.points += 10;
                localStorage.setItem('points', state.points);
                updateHeaderUI();
                saveScoreToGAS();

                lucide.createIcons();
                state.isProcessing = false;
            } else {
                btnElement.style.background = 'rgba(254, 202, 202, 0.8)'; // Red tint
                btnElement.style.borderColor = '#f87171';
                btnElement.classList.remove('opacity-60');
                
                const correctBtn = document.querySelectorAll('.option-btn')[state.currentQuiz.jawapan_betul];
                correctBtn.style.background = 'rgba(187, 247, 208, 0.8)';
                correctBtn.style.borderColor = '#4ade80';
                correctBtn.classList.remove('opacity-60');

                feedbackArea.classList.add('border-red-400', 'bg-red-50/90');
                feedbackHeader.innerHTML = `<i data-lucide="x-circle" class="w-7 h-7 text-red-600"></i> <span class="text-red-700">Kurang Tepat</span>`;
                feedbackText.className = "text-red-800 font-bold text-sm leading-relaxed mb-6";
                feedbackText.innerHTML = "<span class='animate-pulse text-red-600'>AI sedang merangka penerangan...</span>";
                lucide.createIcons();
                
                await generateExplanation(wrongIndex = selectedIndex);
            }
        }

        async function generateExplanation(wrongIndex) {
            const question = state.currentQuiz.soalan;
            const correctAnswer = state.currentQuiz.pilihan[state.currentQuiz.jawapan_betul];
            const wrongAnswer = state.currentQuiz.pilihan[wrongIndex];

            const prompt = `Soalan: ${question}\nJawapan Sebenar: ${correctAnswer}\nJawapan Murid (Salah): ${wrongAnswer}\n\nSebagai seorang guru yang prihatin, terangkan secara ringkas (1-2 ayat sahaja) dalam Bahasa Melayu mengapa jawapan murid itu salah dan berikan galakan.`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-70b-versatile",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.5,
                        max_tokens: 150
                    })
                });
                
                if (!response.ok) throw new Error("Ralat sistem AI penerangan");

                const data = await response.json();
                document.getElementById('feedbackText').textContent = data.choices[0].message.content;
            } catch (error) {
                console.error("Ralat Penerangan:", error);
                document.getElementById('feedbackText').textContent = "Maaf, sistem AI gagal menjana penerangan buat masa ini.";
            } finally {
                state.isProcessing = false;
            }
        }

        async function saveScoreToGAS() {
            if(!state.gasUrl) return;
            try {
                await fetch(state.gasUrl, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'save_score',
                        name: state.playerName,
                        points: state.points
                    })
                });
            } catch(e) {
                console.error("Gagal menyimpan markah ke pelayan:", e);
            }
        }
    </script>
</body>
</html>
