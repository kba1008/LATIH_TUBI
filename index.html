<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latih Tubi Pintar AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }
        .glass-header {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-button {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .glass-button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }
        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-slate-900 min-h-screen text-white font-sans flex flex-col">

    <!-- Header -->
    <header class="glass-header text-white p-4 sticky top-0 z-10">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i data-lucide="brain-circuit" class="w-7 h-7 text-cyan-400"></i>
                <h1 class="text-xl font-bold tracking-wide">Latih<span class="text-cyan-400">AI</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex flex-col items-end">
                    <span id="headerPlayerName" class="text-sm font-semibold text-gray-200">-</span>
                    <span class="text-xs text-cyan-300 font-bold"><span id="headerPoints">0</span> Mata</span>
                </div>
                <button onclick="showLeaderboard()" class="p-2 hover:bg-white/10 rounded-full transition" title="Papan Pendahulu">
                    <i data-lucide="trophy" class="w-5 h-5 text-yellow-400"></i>
                </button>
                <button onclick="promptPassword()" class="p-2 hover:bg-white/10 rounded-full transition" title="Tetapan">
                    <i data-lucide="settings" class="w-5 h-5 text-gray-300"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-3xl mx-auto p-4 mt-6 flex-grow w-full">
        
        <!-- Init / Welcome Screen -->
        <div id="welcomeScreen" class="glass-panel rounded-2xl p-8 text-center fade-in">
            <div class="inline-block p-4 rounded-full bg-white/10 mb-6">
                <i data-lucide="rocket" class="w-12 h-12 text-cyan-400"></i>
            </div>
            <h2 class="text-3xl font-extrabold mb-3 bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-400">Bersedia untuk Cabaran?</h2>
            <p class="text-gray-300 mb-8">Uji minda anda, kumpul mata, dan tewaskan rakan-rakan di Papan Pendahulu!</p>
            
            <div class="max-w-md mx-auto space-y-4">
                <div>
                    <label class="block text-left text-sm text-gray-300 mb-2 ml-1">Nama Pemain</label>
                    <input type="text" id="playerNameInput" class="glass-input w-full rounded-xl p-3 focus:ring-2 focus:ring-cyan-500 outline-none transition" placeholder="Masukkan nama anda...">
                </div>
                <button onclick="initApp()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3 px-6 rounded-xl transition shadow-lg shadow-cyan-500/30 flex items-center justify-center gap-2">
                    <i data-lucide="play-circle" class="w-5 h-5"></i> Mula Bermain
                </button>
            </div>
            <p id="initStatus" class="text-sm text-cyan-300 mt-6 hidden animate-pulse">Sedang menyambung ke pelayan...</p>
        </div>

        <!-- Loading State -->
        <div id="loadingScreen" class="glass-panel rounded-2xl p-10 text-center hidden fade-in">
            <i data-lucide="loader-2" class="w-12 h-12 mx-auto text-cyan-400 animate-spin mb-4"></i>
            <h2 class="text-xl font-bold">AI sedang menjana cabaran...</h2>
            <p class="text-gray-400 mt-2">Sila tunggu sebentar.</p>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="hidden fade-in space-y-6">
            
            <!-- Actions & Note Area -->
            <div class="flex justify-end">
                <button id="btnGenerateNote" onclick="generateNote()" class="flex items-center gap-2 bg-gradient-to-r from-yellow-500 to-orange-500 hover:from-yellow-400 hover:to-orange-400 text-white text-sm font-bold py-2 px-4 rounded-xl transition shadow-lg">
                    <i data-lucide="book-open" class="w-4 h-4"></i> Jana Nota AI
                </button>
            </div>
            
            <!-- Generated Note Card -->
            <div id="noteArea" class="hidden glass-panel rounded-xl p-5 border-l-4 border-l-yellow-400 fade-in">
                <div class="flex items-center gap-2 mb-3 text-yellow-300 font-bold">
                    <i data-lucide="lightbulb" class="w-5 h-5"></i>
                    <h3>Nota Ringkas</h3>
                </div>
                <p id="noteText" class="text-gray-200 text-sm leading-relaxed whitespace-pre-wrap"></p>
            </div>

            <!-- Question Area -->
            <div class="glass-panel p-6 rounded-xl">
                <h3 id="questionText" class="text-xl font-bold mb-6 text-white leading-snug"></h3>
                <div id="optionsContainer" class="space-y-3">
                    <!-- Options will be injected here -->
                </div>
            </div>

            <!-- Feedback Area -->
            <div id="feedbackArea" class="hidden p-5 rounded-xl fade-in glass-panel border-2">
                <div id="feedbackHeader" class="flex items-center gap-2 font-bold mb-2 text-lg"></div>
                <p id="feedbackText" class="text-gray-200 text-sm leading-relaxed mb-4"></p>
                <button onclick="generateNextQuestion()" class="w-full bg-white/20 hover:bg-white/30 text-white font-bold py-3 px-4 rounded-xl transition flex items-center justify-center gap-2">
                    Teruskan <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Leaderboard Modal -->
    <div id="leaderboardModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
        <div class="glass-panel rounded-2xl p-6 w-full max-w-md">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <i data-lucide="trophy" class="w-6 h-6 text-yellow-400"></i>
                    <h3 class="text-xl font-bold">Papan Pendahulu</h3>
                </div>
                <button onclick="closeLeaderboard()" class="text-gray-400 hover:text-white transition">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div id="leaderboardContent" class="space-y-2 max-h-64 overflow-y-auto pr-2">
                <div class="text-center text-gray-400 py-4">Memuat turun data...</div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
        <div class="glass-panel rounded-2xl p-6 w-full max-w-md">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="settings" class="w-5 h-5"></i> Tetapan
                </h3>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-white">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-semibold mb-2 text-gray-300">URL Google Web App</label>
                <input type="text" id="gasUrlInput" class="glass-input w-full rounded-xl p-3 focus:ring-2 focus:ring-cyan-500 outline-none" placeholder="Masukkan link Google Apps Script...">
            </div>
            <button onclick="saveSettings()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-xl transition">
                Simpan Tetapan
            </button>
        </div>
    </div>

    <!-- Custom Alert Modal (Gantikan alert asal untuk sorok URL) -->
    <div id="customAlertModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 hidden z-[100]">
        <div class="glass-panel rounded-2xl p-6 w-full max-w-sm text-center transform scale-95 transition-transform duration-300" id="customAlertBox">
            <div id="customAlertIcon" class="mx-auto mb-4 w-12 h-12 flex items-center justify-center rounded-full bg-cyan-500/20 text-cyan-400">
                <i data-lucide="info" class="w-6 h-6"></i>
            </div>
            <h3 id="customAlertTitle" class="text-lg font-bold mb-2">Makluman</h3>
            <p id="customAlertMessage" class="text-gray-300 text-sm mb-6"></p>
            <button onclick="closeCustomAlert()" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 px-6 rounded-xl transition w-full">Tutup</button>
        </div>
    </div>

    <!-- Custom Prompt Modal (Gantikan prompt asal untuk sorok URL) -->
    <div id="customPromptModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 hidden z-[100]">
        <div class="glass-panel rounded-2xl p-6 w-full max-w-sm transform scale-95 transition-transform duration-300" id="customPromptBox">
            <h3 class="text-lg font-bold mb-2">Pengesahan</h3>
            <p id="customPromptMessage" class="text-gray-300 text-sm mb-4"></p>
            <input type="password" id="customPromptInput" class="glass-input w-full rounded-xl p-3 focus:ring-2 focus:ring-cyan-500 outline-none transition mb-4" placeholder="...">
            <div class="flex gap-3">
                <button onclick="closeCustomPrompt()" class="flex-1 bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded-xl transition">Batal</button>
                <button onclick="submitCustomPrompt()" class="flex-1 bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 px-4 rounded-xl transition">Sahkan</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // URL GAS LALAI DARI PENGGUNA
        // ==========================================
        const DEFAULT_GAS_URL = "https://script.google.com/macros/s/AKfycbxkenFUkoDuUBXJoLhmZuUnzzXla4ZmJb9D2AwXCelO8_bYqW38dyK2AuLUN72bRyYJMg/exec";
        // ==========================================

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker terdaftar', reg))
                    .catch(err => console.error('Ralat Service Worker', err));
            });
        }

        // Initialize Icons
        lucide.createIcons();

        // App State
        let state = {
            gasUrl: localStorage.getItem('gasUrl') || DEFAULT_GAS_URL,
            apiKey: '',
            questions: [],
            currentQuiz: null,
            isProcessing: false,
            playerName: localStorage.getItem('playerName') || '',
            points: parseInt(localStorage.getItem('points')) || 0,
            noteGenerated: false
        };

        // Set initial UI
        if(state.playerName) document.getElementById('playerNameInput').value = state.playerName;
        updateHeaderUI();

        // Custom Alert Logic
        function showCustomAlert(message, isError = false) {
            document.getElementById('customAlertMessage').textContent = message;
            const iconDiv = document.getElementById('customAlertIcon');
            if (isError) {
                iconDiv.className = 'mx-auto mb-4 w-12 h-12 flex items-center justify-center rounded-full bg-red-500/20 text-red-400';
                iconDiv.innerHTML = '<i data-lucide="alert-triangle" class="w-6 h-6"></i>';
                document.getElementById('customAlertTitle').textContent = 'Ralat';
            } else {
                iconDiv.className = 'mx-auto mb-4 w-12 h-12 flex items-center justify-center rounded-full bg-cyan-500/20 text-cyan-400';
                iconDiv.innerHTML = '<i data-lucide="info" class="w-6 h-6"></i>';
                document.getElementById('customAlertTitle').textContent = 'Makluman';
            }
            lucide.createIcons();
            const modal = document.getElementById('customAlertModal');
            modal.classList.remove('hidden');
            setTimeout(() => document.getElementById('customAlertBox').classList.replace('scale-95', 'scale-100'), 10);
        }

        function closeCustomAlert() {
            document.getElementById('customAlertBox').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('customAlertModal').classList.add('hidden'), 300);
        }

        // Custom Prompt Logic
        let promptCallback = null;
        function showCustomPrompt(message, callback) {
            document.getElementById('customPromptMessage').textContent = message;
            document.getElementById('customPromptInput').value = '';
            promptCallback = callback;
            const modal = document.getElementById('customPromptModal');
            modal.classList.remove('hidden');
            setTimeout(() => document.getElementById('customPromptBox').classList.replace('scale-95', 'scale-100'), 10);
        }

        function closeCustomPrompt() {
            document.getElementById('customPromptBox').classList.replace('scale-100', 'scale-95');
            setTimeout(() => document.getElementById('customPromptModal').classList.add('hidden'), 300);
            promptCallback = null;
        }

        function submitCustomPrompt() {
            const val = document.getElementById('customPromptInput').value;
            if (promptCallback) promptCallback(val);
            closeCustomPrompt();
        }

        // UI Functions
        function updateHeaderUI() {
            document.getElementById('headerPlayerName').textContent = state.playerName || '-';
            document.getElementById('headerPoints').textContent = state.points;
        }

        function promptPassword() {
            showCustomPrompt("Sila masukkan kata laluan untuk mengakses tetapan:", (pwd) => {
                if (pwd === "101010") {
                    document.getElementById('gasUrlInput').value = state.gasUrl;
                    document.getElementById('settingsModal').classList.remove('hidden');
                } else if (pwd !== "") {
                    showCustomAlert("Kata laluan salah!", true);
                }
            });
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function saveSettings() {
            state.gasUrl = document.getElementById('gasUrlInput').value.trim();
            localStorage.setItem('gasUrl', state.gasUrl);
            showCustomAlert("Tetapan berjaya disimpan!");
            closeSettings();
        }

        function showScreen(screenId) {
            ['welcomeScreen', 'loadingScreen', 'quizScreen'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
        }

        async function showLeaderboard() {
            document.getElementById('leaderboardModal').classList.remove('hidden');
            const lbContent = document.getElementById('leaderboardContent');
            lbContent.innerHTML = '<div class="text-center text-cyan-400 py-4 animate-pulse">Memuat turun data...</div>';

            if(!state.gasUrl) {
                lbContent.innerHTML = '<div class="text-center text-red-400 py-4">Sila tetapkan URL Web App dahulu.</div>';
                return;
            }

            try {
                const response = await fetch(state.gasUrl, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'get_leaderboard' })
                });
                
                if (!response.ok) throw new Error("Rangkaian pelayan bermasalah");
                const data = await response.json();
                
                if(data.leaderboard && data.leaderboard.length > 0) {
                    lbContent.innerHTML = '';
                    data.leaderboard.forEach((player, index) => {
                        let medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `<span class="w-6 inline-block text-center text-gray-400">${index+1}</span>`;
                        let isMe = player.name === state.playerName ? 'bg-white/20 border-cyan-400/50' : 'bg-black/20 border-transparent';
                        
                        lbContent.innerHTML += `
                            <div class="flex justify-between items-center p-3 rounded-lg border ${isMe}">
                                <div class="flex items-center gap-3">
                                    <span class="text-xl">${medal}</span>
                                    <span class="font-bold ${player.name === state.playerName ? 'text-cyan-300' : 'text-gray-200'}">${player.name}</span>
                                </div>
                                <span class="font-black text-cyan-400">${player.points} <span class="text-xs font-normal text-gray-400">pts</span></span>
                            </div>
                        `;
                    });
                } else {
                    lbContent.innerHTML = '<div class="text-center text-gray-400 py-4">Belum ada rekod pendahulu.</div>';
                }
            } catch(e) {
                console.error("Ralat memuat turun Papan Pendahulu:", e);
                lbContent.innerHTML = '<div class="text-center text-red-400 py-4">Gagal memuat turun papan pendahulu. Sila cuba lagi.</div>';
            }
        }

        function closeLeaderboard() {
            document.getElementById('leaderboardModal').classList.add('hidden');
        }

        // Main Logic
        async function initApp() {
            const nameInput = document.getElementById('playerNameInput').value.trim();
            if (!nameInput) {
                showCustomAlert("Sila masukkan nama anda untuk mula mengumpul markah.", true);
                return;
            }
            
            state.playerName = nameInput;
            localStorage.setItem('playerName', state.playerName);
            updateHeaderUI();

            if (!state.gasUrl) {
                showCustomAlert("Sila masukkan URL Google Web App melalui butang tetapan terlebih dahulu.", true);
                return;
            }
            
            const statusEl = document.getElementById('initStatus');
            statusEl.classList.remove('hidden');
            statusEl.textContent = "Menyambung pangkalan data...";

            try {
                const response = await fetch(state.gasUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'init', name: state.playerName })
                });
                
                if (!response.ok) throw new Error("Gagal menyambung ke pangkalan data Google Sheet.");
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);
                if (!data.questions || data.questions.length === 0) throw new Error("Tiada rekod soalan ditemui dalam tab 'SOALAN'.");

                state.apiKey = data.apiKey;
                state.questions = data.questions;
                
                // Sync points from DB if exists
                if(data.userPoints !== undefined) {
                    state.points = data.userPoints;
                    localStorage.setItem('points', state.points);
                    updateHeaderUI();
                }

                await generateNextQuestion();

            } catch (error) {
                console.error("Ralat Init App:", error);
                showCustomAlert("Ralat Sistem: " + error.message, true);
                statusEl.classList.add('hidden');
            }
        }

        async function generateNextQuestion() {
            showScreen('loadingScreen');
            document.getElementById('feedbackArea').classList.add('hidden');
            
            // Reset note state
            state.noteGenerated = false;
            document.getElementById('noteArea').classList.add('hidden');
            const btnNote = document.getElementById('btnGenerateNote');
            btnNote.disabled = false;
            btnNote.innerHTML = `<i data-lucide="book-open" class="w-4 h-4"></i> Jana Nota AI`;
            
            const randomTopic = state.questions[Math.floor(Math.random() * state.questions.length)];
            
            const prompt = `Anda ialah guru pakar di Malaysia. Berdasarkan topik berikut: "${randomTopic}", hasilkan:
1. 1 Soalan objektif berkaitan topik tersebut.
2. 4 pilihan jawapan (A, B, C, D).
3. Indeks jawapan yang betul (0 untuk A, 1 untuk B, 2 untuk C, 3 untuk D).

Berikan maklum balas HANYA dalam format JSON yang sah seperti struktur di bawah, tanpa sebarang teks tambahan atau markdown:
{
  "soalan": "Teks soalan di sini...",
  "pilihan": ["Pilihan 1", "Pilihan 2", "Pilihan 3", "Pilihan 4"],
  "jawapan_betul": 0
}`;

            try {
                const groqResponse = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.7
                    })
                });

                if (!groqResponse.ok) {
                    const errorData = await groqResponse.json();
                    console.error("Ralat Pelayan Groq API:", errorData);
                    throw new Error("Sistem AI lambat bertindak balas atau kuota tamat. (Kod: " + groqResponse.status + ")");
                }

                const groqData = await groqResponse.json();
                const content = groqData.choices[0].message.content;
                
                const jsonMatch = content.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error("Format JSON dari AI tidak tepat.");
                
                state.currentQuiz = JSON.parse(jsonMatch[0]);
                renderQuiz();
                showScreen('quizScreen');

            } catch (error) {
                console.error("Ralat Penjanaan Soalan:", error);
                showCustomAlert("Ada ralat semasa menjana soalan AI: " + error.message + ". Sila cuba lagi.", true);
                showScreen('welcomeScreen');
            }
        }

        function renderQuiz() {
            document.getElementById('questionText').textContent = state.currentQuiz.soalan;
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            state.currentQuiz.pilihan.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-4 rounded-xl glass-button font-medium option-btn flex items-start gap-3';
                btn.innerHTML = `<span class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full bg-white/10 font-bold text-cyan-300">${['A','B','C','D'][index]}</span> <span>${opt}</span>`;
                btn.onclick = () => handleAnswer(index, btn);
                container.appendChild(btn);
            });
            lucide.createIcons();
        }

        async function generateNote() {
            if (state.noteGenerated || !state.currentQuiz) return;
            
            const btn = document.getElementById('btnGenerateNote');
            const noteArea = document.getElementById('noteArea');
            const noteText = document.getElementById('noteText');
            
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Menjana...`;
            lucide.createIcons();
            
            noteArea.classList.remove('hidden');
            noteText.innerHTML = '<span class="animate-pulse text-yellow-200/80">AI sedang menyusun nota ringkas untuk anda...</span>';

            const prompt = `Soalan: ${state.currentQuiz.soalan}\nPilihan Jawapan: ${state.currentQuiz.pilihan.join(", ")}\n\nSebagai guru pakar, berikan satu nota ringkas dan sangat mudah difahami berkaitan topik ini. Kaitkan nota tersebut dengan pilihan jawapan yang diberikan supaya murid faham mengapa pilihan tersebut wujud tanpa memberikan secara terang jawapan bocor. Tulis dalam perenggan yang kemas dan Bahasa Melayu yang santai.`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.5,
                        max_tokens: 300
                    })
                });
                
                if (!response.ok) throw new Error("Ralat sistem AI nota");

                const data = await response.json();
                noteText.textContent = data.choices[0].message.content;
                state.noteGenerated = true;
                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> Nota Dijana`;
            } catch (error) {
                console.error("Ralat Penjanaan Nota:", error);
                noteText.textContent = "Gagal menjana nota. Sila cuba sebentar lagi.";
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="book-open" class="w-4 h-4"></i> Cuba Semula`;
            }
            lucide.createIcons();
        }

        async function handleAnswer(selectedIndex, btnElement) {
            if (state.isProcessing) return;
            state.isProcessing = true;
            
            document.querySelectorAll('.option-btn').forEach(b => {
                b.disabled = true;
                b.classList.remove('hover:bg-white/25');
                b.classList.add('opacity-50', 'cursor-not-allowed');
            });

            const isCorrect = selectedIndex === state.currentQuiz.jawapan_betul;
            const feedbackArea = document.getElementById('feedbackArea');
            const feedbackHeader = document.getElementById('feedbackHeader');
            const feedbackText = document.getElementById('feedbackText');
            
            feedbackArea.classList.remove('hidden', 'border-green-500/50', 'border-red-500/50', 'bg-green-900/20', 'bg-red-900/20');
            feedbackHeader.innerHTML = '';
            
            if (isCorrect) {
                // Correct Answer Logic
                btnElement.classList.add('bg-green-500/30', 'border-green-400', 'opacity-100');
                btnElement.classList.remove('opacity-50');
                
                feedbackArea.classList.add('border-green-500/50', 'bg-green-900/20');
                feedbackHeader.innerHTML = `<i data-lucide="check-circle-2" class="w-6 h-6 text-green-400"></i> <span class="text-green-400">Tepat Sekali! +10 Mata</span>`;
                feedbackText.textContent = "Tahniah! Jawapan anda adalah betul. Teruskan usaha cemerlang ini.";
                
                // Add Points
                state.points += 10;
                localStorage.setItem('points', state.points);
                updateHeaderUI();
                saveScoreToGAS();

                lucide.createIcons();
                state.isProcessing = false;
            } else {
                // Wrong Answer Logic
                btnElement.classList.add('bg-red-500/30', 'border-red-400', 'opacity-100');
                btnElement.classList.remove('opacity-50');
                
                const correctBtn = document.querySelectorAll('.option-btn')[state.currentQuiz.jawapan_betul];
                correctBtn.classList.add('bg-green-500/30', 'border-green-400', 'opacity-100');
                correctBtn.classList.remove('opacity-50');

                feedbackArea.classList.add('border-red-500/50', 'bg-red-900/20');
                feedbackHeader.innerHTML = `<i data-lucide="x-circle" class="w-6 h-6 text-red-400"></i> <span class="text-red-400">Kurang Tepat</span>`;
                feedbackText.innerHTML = "<span class='animate-pulse text-cyan-300'>AI sedang merangka penerangan...</span>";
                lucide.createIcons();
                
                await generateExplanation(selectedIndex);
            }
        }

        async function generateExplanation(wrongIndex) {
            const question = state.currentQuiz.soalan;
            const correctAnswer = state.currentQuiz.pilihan[state.currentQuiz.jawapan_betul];
            const wrongAnswer = state.currentQuiz.pilihan[wrongIndex];

            const prompt = `Soalan: ${question}\nJawapan Sebenar: ${correctAnswer}\nJawapan Murid (Salah): ${wrongAnswer}\n\nSebagai seorang guru yang prihatin, terangkan secara ringkas (1-2 ayat sahaja) dalam Bahasa Melayu mengapa jawapan murid itu salah dan berikan galakan.`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.5,
                        max_tokens: 150
                    })
                });
                
                if (!response.ok) throw new Error("Ralat sistem AI penerangan");

                const data = await response.json();
                document.getElementById('feedbackText').textContent = data.choices[0].message.content;
            } catch (error) {
                console.error("Ralat Penerangan:", error);
                document.getElementById('feedbackText').textContent = "Maaf, sistem AI gagal menjana penerangan buat masa ini.";
            } finally {
                state.isProcessing = false;
            }
        }

        async function saveScoreToGAS() {
            if(!state.gasUrl) return;
            try {
                await fetch(state.gasUrl, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'save_score',
                        name: state.playerName,
                        points: state.points
                    })
                });
            } catch(e) {
                console.error("Gagal menyimpan markah ke pelayan:", e);
            }
        }
    </script>
</body>
</html>
